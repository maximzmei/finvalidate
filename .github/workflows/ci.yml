name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Release link
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          TAG="master-$(date -u +'%Y-%m-%d-%H%M')"
          REPO="${{ github.repository }}"
          URL="https://github.com/${REPO}/releases/new?tag=${TAG}&title=${TAG}&target=${{ github.sha }}"
          echo "### ✅ CI passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[🚀 Create release \`${TAG}\` →](${URL})" >> $GITHUB_STEP_SUMMARY
