name: E2E

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build dist/index.js
        run: npm run build

      - name: Run E2E tests
        run: npm run e2e
        env:
          E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
          E2E_REPO_OWNER: ${{ github.repository_owner }}
          E2E_REPO_NAME: finvalidate-e2e-sandbox
